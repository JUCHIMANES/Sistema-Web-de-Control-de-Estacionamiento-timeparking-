<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-image: url("https://images.pexels.com/photos/5075095/pexels-photo-5075095.jpeg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
      }

      .header {
        background-color: rgba(255, 255, 255, 0.85);
        padding: 1rem;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .login-container {
        min-height: calc(100vh - 80px);
      }

      .login-box {
        width: 100%;
        max-width: 500px;
        margin: 40px auto;
        padding: 2rem;
        background-color: white;
        border-radius: 1rem;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      }

      .password-toggle {
        cursor: pointer;
      }
      /* Estilo del Logo */
      .navbar-brand-custom {
        font-family: 'Righteous', sans-serif;
        font-size: 1.3rem;
        letter-spacing: 1px;
        color: #1477d4 !important; /* El azul de Bootstrap */
        transition: color 0.3s ease;
      }
      .navbar-brand-custom i {
        font-size: 1.4rem;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <header class="header d-flex justify-content-between align-items-center">
      <a href="/" class="btn btn-outline-primary btn-sm">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
      <a class="navbar-brand navbar-brand-custom d-flex align-items-center" href="#">
        <div class="position-relative me-3">
            <i class="bi bi-car-front-fill" style="font-size: 1.8rem;"></i>
            <i class="bi bi-clock-fill position-absolute" 
            style="font-size: 0.9rem; bottom: -2px; right: -5px; color: #1c3455; background: white; border-radius: 50%;"></i>
        </div>
        <span>Timeparking</span>
        </a>
    </header>

    <div
      class="container d-flex justify-content-center align-items-center login-container"
    >
      <div class="login-box">
        <h2 class="text-center mb-4">Crear cuenta</h2>
        <form method="post">
          <div class="mb-3">
            <label for="name" class="form-label">Nombre</label>
            <input
              name="name"
              type="text"
              class="form-control"
              id="name"
              required
            />
          </div>
          <div class="mb-3">
            <label for="last_name" class="form-label">Apellido</label>
            <input
              name="last_name"
              type="text"
              class="form-control"
              id="last_name"
              required
            />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input
              name="email"
              type="email"
              class="form-control"
              id="email"
              required
            />
          </div>
          <div class="mb-3 position-relative">
            <label for="password" class="form-label">Contraseña</label>
            <div class="input-group">
              <input
                name="password"
                type="password"
                class="form-control"
                id="password"
                required
              />
              <span
                class="input-group-text password-toggle"
                onclick="togglePassword()"
              >
                <i class="bi bi-eye" id="toggleIcon"></i>
              </span>
            </div>
          </div>
          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary">Registrarse</button>
          </div>
          <div class="text-center">
            <small
              >¿Ya tienes una cuenta?
              <a href="/auth/login">Inicia sesión</a></small
            >
          </div>
        </form>
      </div>
    </div>

    <div
      class="modal fade"
      id="messageModal"
      tabindex="-1"
      aria-labelledby="messageModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div id="modalHeader" class="modal-header">
            <h5 class="modal-title" id="messageModalLabel">Mensaje</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body">
            <ul class="mb-0">
              {% for category, message in
              get_flashed_messages(with_categories=true) %}
              <li class="message-item" data-category="{{ category }}">
                {{ message }}
              </li>
              {% endfor %}
            </ul>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", function () {
        const messages = document.querySelectorAll(".message-item");
        if (messages.length > 0) {
          const modalHeader = document.getElementById("modalHeader");
          const modalTitle = document.getElementById("messageModalLabel");
          let mainCategory = messages[0].dataset.category;

          if (mainCategory === "success") {
            modalHeader.classList.add("bg-success", "text-white");
            modalTitle.textContent = "Éxito";
          } else if (mainCategory === "error") {
            modalHeader.classList.add("bg-danger", "text-white");
            modalTitle.textContent = "Error";
          } else {
            modalHeader.classList.add("bg-secondary", "text-white");
            modalTitle.textContent = "Mensaje";
          }

          const messageModal = new bootstrap.Modal(
            document.getElementById("messageModal")
          );
          messageModal.show();
        }
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const icon = document.getElementById("toggleIcon");
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        } else {
          passwordInput.type = "password";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        }
      }
    </script>
  </body>
</html>
