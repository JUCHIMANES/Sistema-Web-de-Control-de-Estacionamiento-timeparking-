<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes - Timeparking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .chart-container { position: relative; height: 300px; width: 100%; }

        .header {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 1rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .navbar-brand-custom {
            font-family: 'Righteous', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: #1477d4 !important;
            transition: color 0.3s ease;
        }
        .navbar-brand-custom i {
            font-size: 1.4rem;
            vertical-align: middle;
        }
        
        /* Estilos chidos para el selector del Modal */
        .format-selector input[type="radio"]:checked + label {
            border-color: #1477d4 !important;
            background-color: rgba(20, 119, 212, 0.05);
            box-shadow: 0 0 10px rgba(20, 119, 212, 0.15);
        }
        .format-card {
            border: 2px solid #dee2e6;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .format-card:hover {
            border-color: #999;
        }
    </style>
</head>
<body>
    <header class="header d-flex justify-content-between align-items-center">
      <a href="/admin/" class="btn btn-outline-primary btn-sm">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
      <a class="navbar-brand navbar-brand-custom d-flex align-items-center" href="#">
        <div class="position-relative me-3">
          <i class="bi bi-car-front-fill" style="font-size: 1.8rem;"></i>
          <i class="bi bi-clock-fill position-absolute" 
            style="font-size: 0.9rem; bottom: -2px; right: -5px; color: #1c3455; background: white; border-radius: 50%;"></i>
        </div>
        <span>Timeparking</span>
      </a>
    </header>

    <div class="container my-5">
        <!-- CABECERA DEL PANEL CON EL BOTÓN NUEVO -->
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mb-4 gap-3">
            <h2 class="fw-bold mb-0" style="font-size:1.5rem; color: #5f0475;">
                <i class="bi bi-bar-chart-line me-2" style="color: #9806bd;"></i>Panel de Reportes Históricos
            </h2>
            <button type="button" class="btn btn-success rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#downloadReportModal">
                <i class="bi bi-cloud-download me-2"></i>Descargar Reporte
            </button>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm p-4">
                    <h5 class="fw-bold mb-3 text-center">Uso del Sistema (App vs Asistido)</h5>
                    <div class="chart-container">
                        <canvas id="userChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm p-4">
                    <h5 class="fw-bold mb-3 text-center">Ingresos Totales ($)</h5>
                    <div class="chart-container">
                        <canvas id="incomeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONFIGURACIÓN DEL REPORTE -->
    <div class="modal fade" id="downloadReportModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header bg-dark text-white rounded-top-4 py-3">
                    <h5 class="modal-title fw-bold">
                        <i class="bi bi-gear-fill text-info me-2"></i>Configurar Reporte Ejecutivo
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <!-- El formulario abre en pestaña nueva para manejar la descarga limpiamente -->
                <form action="/admin/reports/export" method="GET" target="_blank">
                    <div class="modal-body p-4">
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label fw-bold text-secondary small">FECHA DE INICIO</label>
                                <input type="date" name="start_date" class="form-control rounded-3" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-bold text-secondary small">FECHA FINAL</label>
                                <input type="date" name="end_date" class="form-control rounded-3" required>
                            </div>
                            
                            <div class="col-12 mt-4">
                                <label class="form-label fw-bold text-secondary small d-block mb-2">FORMATO DE EXPORTACIÓN</label>
                                <div class="d-flex gap-3 format-selector">
                                    <div class="flex-fill">
                                        <input type="radio" name="format" id="fmtPdf" value="pdf" class="d-none" checked>
                                        <label for="fmtPdf" class="format-card d-block p-3 text-center rounded-3 w-100">
                                            <i class="bi bi-filetype-pdf display-6 text-danger d-block mb-1"></i>
                                            <span class="fw-bold d-block text-dark">Documento PDF</span>
                                            <small class="text-muted text-xs">Incluye tablas y gráficas</small>
                                        </label>
                                    </div>
                                    <div class="flex-fill">
                                        <input type="radio" name="format" id="fmtExcel" value="excel" class="d-none">
                                        <label for="fmtExcel" class="format-card d-block p-3 text-center rounded-3 w-100">
                                            <i class="bi bi-filetype-csv display-6 text-success d-block mb-1"></i>
                                            <span class="fw-bold d-block text-dark">Excel (XLSX)</span>
                                            <small class="text-muted text-xs">Ideal para auditoría pura</small>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4 pt-0">
                        <button type="button" class="btn btn-light rounded-3 fw-semibold" data-bs-dismiss="modal">Cerrar</button>
                        <button type="submit" class="btn btn-primary rounded-3 px-4 fw-semibold shadow-sm" data-bs-dismiss="modal">
                            <i class="bi bi-download me-2"></i>Descargar Reporte
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS DE LAS GRÁFICAS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const ctxUser = document.getElementById('userChart').getContext('2d');
        new Chart(ctxUser, {
            type: 'doughnut',
            data: {
                labels: ['App (Por hora)', 'Asistidos (Por hora)', 'Pensionados'],
                datasets: [{
                    data: [{{ app_count }}, {{ assisted_count }}, {{ pension_count }}],
                    backgroundColor: ['#0d6efd', '#0f7888', '#d4a017'],
                    hoverOffset: 4
                }]
            },
            options: { maintainAspectRatio: false }
        });

        const ctxIncome = document.getElementById('incomeChart').getContext('2d');
        new Chart(ctxIncome, {
            type: 'bar',
            data: {
                labels: ['App', 'Asistido (Hora)', 'Pensiones'],
                datasets: [{
                    label: 'Pesos Mexicanos',
                    data: [{{ ingresos_app }}, {{ ingresos_asistido }}, {{ ingresos_pension }}],
                    backgroundColor: ['#6f42c1', '#20c997', '#ffc107'],
                    borderRadius: 8
                }]
            },
            options: {
                maintainAspectRatio: false,
                scales: { 
                    y: { 
                        beginAtZero: true,
                        ticks: { callback: function(value) { return '$' + value; } }
                    } 
                }
            }
        });
    </script>
</body>
</html>
